name: Deploy to Cloudflare Workers + D1

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allows manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare
    
    steps:
      # Checkout code
      - uses: actions/checkout@v4

      # Setup Node.js with caching
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Install Cloudflare Workers types
      - name: Install Cloudflare types
        run: npm install -D @cloudflare/workers-types

      # Run type checking
      - name: Type check
        run: npm run typecheck

      # Run linter
      - name: Lint
        run: npm run lint

      # Build application
      - name: Build
        run: npm run build

      # Prepare deployment config
      - name: Prepare Deploy Config
        run: npm run predeploy

      # Apply D1 migrations to remote database
      - name: Apply D1 Migrations
        run: npx wrangler d1 migrations apply smtp-forge-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Deploy to Cloudflare Workers
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Use the generated deploy config from prepare-deploy script
          command: deploy --config .output/wrangler.deploy.json

