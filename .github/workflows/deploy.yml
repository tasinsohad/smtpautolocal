name: Deploy to Cloudflare Workers + D1

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_migrations:
        description: 'Skip D1 migrations (if already applied)'
        required: false
        default: 'false'
        type: boolean

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare
    
    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js with caching
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Install Cloudflare Workers types
      - name: Install Cloudflare types
        run: npm install -D @cloudflare/workers-types

      # Install Wrangler
      - name: Install Wrangler
        run: npm install -D wrangler

      # Run type checking
      - name: Type check
        run: npm run typecheck

      # Run linter
      - name: Lint
        run: npm run lint

      # Build application
      - name: Build application
        run: npm run build

      # Prepare deployment config
      - name: Prepare deploy config
        run: npm run predeploy

      # Create D1 database if it doesn't exist
      - name: Create D1 database (if needed)
        run: |
          echo \"Checking if D1 database exists...\"
          # Check if database exists
          DB_LIST=$(npx wrangler d1 list 2>&1)
          echo \"$DB_LIST\"
          
          if echo \"$DB_LIST\" | grep -q \"smtp-forge-db\"; then
            echo \"Database 'smtp-forge-db' already exists.\"
            # Extract database ID from list output (format: UUID)
            DATABASE_ID=$(echo \"$DB_LIST\" | grep \"smtp-forge-db\" | grep -oE '[a-f0-9-]{36}' | head -1)
            echo \"Found existing Database ID: $DATABASE_ID\"
          else
            echo \"Creating D1 database 'smtp-forge-db'...\"
            CREATE_OUTPUT=$(npx wrangler d1 create smtp-forge-db 2>&1)
            echo \"$CREATE_OUTPUT\"
            # Extract database ID - look for UUID pattern after \"Database ID:\"
            DATABASE_ID=$(echo \"$CREATE_OUTPUT\" | grep -oE '[a-f0-9-]{36}' | head -1)
            echo \"Created new Database ID: $DATABASE_ID\"
          fi
          
          if [ -z \"$DATABASE_ID\" ]; then
            echo \"ERROR: Could not determine database ID\"
            exit 1
          fi
          
          echo \"CLOUDFLARE_D1_DATABASE_ID=$DATABASE_ID\" >> $GITHUB_ENV
          echo \"Database ID set: $DATABASE_ID\"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Apply D1 migrations (unless skipped)
      - name: Apply D1 migrations
        if: github.event.inputs.skip_migrations != 'true'
        run: |
          echo \"Applying D1 migrations...\"
          echo \"Using Database ID: ${{ env.CLOUDFLARE_D1_DATABASE_ID }}\"
          npx wrangler d1 migrations apply smtp-forge-db --remote --yes
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ env.CLOUDFLARE_D1_DATABASE_ID }}

      # Deploy to Cloudflare Workers
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Pass the database ID as a variable
          command: deploy --config .output/wrangler.deploy.json --var CLOUDFLARE_D1_DATABASE_ID:${{ env.CLOUDFLARE_D1_DATABASE_ID }}

      # Verify deployment
      - name: Verify deployment
        run: |
          echo \"✓ Deployment complete!\"
          echo \"Worker URL: https://smtp-forge.${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.workers.dev\"
          echo \"\"
          echo \"Next steps:\"
          echo \"1. Visit your worker URL to verify it's working\"
          echo \"2. Set up a custom domain in Cloudflare Dashboard if needed\"
          echo \"3. Configure your DNS records for your domains\"